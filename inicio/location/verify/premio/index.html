<html lang="pt-BR">
<head>
<script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f5f5f5">
    <title>SHEIN Premiações</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="premio.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">


</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo-container">
                <img src="sheinlogo.png" alt="SHEIN Premiações" class="logo">
            </div>
            <div class="prize-info">
                <span class="prize-label">Acumulado em prêmios:</span>
                <span class="prize-value" id="prizeValue">R$ 0,00</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container premio-main">
        <h1 class="page-title">Escolha os itens do seu prêmio:</h1>

        <!-- Prize Option 1 - Looks -->
        <div class="prize-card">
            <div class="scarcity-badge">
                <span class="fire-icon">🔥</span> Últimos 2 kits disponíveis!
            </div>
            <div class="prize-image-container">
                <img src="looks.png" alt="Looks da SHEIN" class="prize-image">
            </div>
            <p class="prize-description">
                <strong>Looks da SHEIN Tema Livre</strong> Valor de até <strong>R$ 1.500,00</strong>.
            </p>
            <button class="prize-btn" onclick="selectPrize('looks')">
                QUERO ESTE!
            </button>
        </div>

        <!-- Separator -->
        <div class="separator">ou</div>

        <!-- Prize Option 2 - Maquiagem -->
        <div class="prize-card">
            <div class="scarcity-badge">
                <span class="fire-icon">🔥</span> Últimos 3 kits disponíveis!
            </div>
            <div class="prize-image-container">
                <img src="maquiagem.png" alt="Kits Maquiagens SHEIN" class="prize-image">
            </div>
            <p class="prize-description">
                <strong>Kits Maquiagens SHEIN</strong> Valor de até <strong>R$ 1.500,00</strong>.
            </p>
            <button class="prize-btn" onclick="selectPrize('maquiagem')">
                QUERO ESTE!
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer premio-footer">
        <div class="footer-line"></div>
        <p class="footer-text">SHEIN Brasil Copyright 2026</p>
        <p class="footer-text">Todos os direitos reservados.</p>
    </footer>

    <script>
        // Pega o saldo da URL (vindo da página anterior)
        const urlParams = new URLSearchParams(window.location.search);
        const prizeFromPrevious = parseFloat(urlParams.get('prize')) || 2157;
        
        // Atualiza o valor exibido
        document.getElementById('prizeValue').textContent = 'R$ ' + prizeFromPrevious.toLocaleString('pt-BR', { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        });
        
        // Função para selecionar prêmio
        function selectPrize(tipo) {
            // Redireciona para próxima página passando o tipo de prêmio e o saldo
            window.location.href = '../saque/?tipo=' + tipo + '&prize=' + prizeFromPrevious;
        }
    </script>

</body>
</html>
