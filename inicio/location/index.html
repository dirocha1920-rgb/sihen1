<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script type="text/javascript">(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window, document, "clarity", "script", "um1jjg7699");</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f5f5f5">
    <title>SHEIN Premiações</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="location.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">


</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content header-centered">
            <div class="logo-container">
                <img src="sheinlogo.png" alt="SHEIN Premiações" class="logo">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="location-card">
            <p class="location-intro">
                Para prosseguirmos, informe seu <strong>Estado e Cidade</strong> e verifique se ainda há prêmios disponíveis na sua região.
            </p>

            <form id="locationForm" action="verify/" method="GET">
                <!-- Estado -->
                <div class="form-group">
                    <label for="estado" class="form-label">Estado:</label>
                    <div class="select-wrapper">
                        <select id="estado" name="estado" required>
                            <option value="" disabled selected>Selecione seu Estado</option>
                            <option value="AC">Acre</option>
                            <option value="AL">Alagoas</option>
                            <option value="AP">Amapá</option>
                            <option value="AM">Amazonas</option>
                            <option value="BA">Bahia</option>
                            <option value="CE">Ceará</option>
                            <option value="DF">Distrito Federal</option>
                            <option value="ES">Espírito Santo</option>
                            <option value="GO">Goiás</option>
                            <option value="MA">Maranhão</option>
                            <option value="MT">Mato Grosso</option>
                            <option value="MS">Mato Grosso do Sul</option>
                            <option value="MG">Minas Gerais</option>
                            <option value="PA">Pará</option>
                            <option value="PB">Paraíba</option>
                            <option value="PR">Paraná</option>
                            <option value="PE">Pernambuco</option>
                            <option value="PI">Piauí</option>
                            <option value="RJ">Rio de Janeiro</option>
                            <option value="RN">Rio Grande do Norte</option>
                            <option value="RS">Rio Grande do Sul</option>
                            <option value="RO">Rondônia</option>
                            <option value="RR">Roraima</option>
                            <option value="SC">Santa Catarina</option>
                            <option value="SP">São Paulo</option>
                            <option value="SE">Sergipe</option>
                            <option value="TO">Tocantins</option>
                        </select>
                        <div class="select-arrow">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Cidade -->
                <div class="form-group">
                    <label for="cidade" class="form-label">Cidade:</label>
                    <input 
                        type="text" 
                        id="cidade" 
                        name="cidade" 
                        placeholder="Digite sua cidade"
                        required
                        autocomplete="off"
                    >
                </div>

                <!-- Submit Button -->
                <button type="submit" class="continue-btn">
                    <span>CONTINUAR</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-line"></div>
        <p class="footer-text">SHEIN Brasil – Copyright 2026</p>
        <p class="footer-text">Todos os direitos reservados.</p>
    </footer>

</body>
</html>
